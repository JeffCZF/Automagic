<head>
    <title>重启</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>重启</h1>

<div class="summary">
    <p>
        <b>重启</b>动作重启设备。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能需要 root 权限，不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每天早上 6 点重启设备。</li>
    </ul>

</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">选项</div>
    <div class="setting_description">设备重启时传递给内核的选项。例如，<code>recovery</code> 可启动到恢复模式。<a href="action_script.html#inline_expressions">支持变量。</a></div>


</div>

</body>

</html>
