<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置动态壁纸</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置动态壁纸</h1>

<div class="summary">
    <p>
        动作 <b>设置动态壁纸</b> 将手机壁纸更改为指定的动态壁纸。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能需要 root 权限，不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在家时更换壁纸。</li>
        <li>收到短信时更换壁纸。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">动态壁纸</div>
    <div class="setting_description">要设置的动态壁纸的组件名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
