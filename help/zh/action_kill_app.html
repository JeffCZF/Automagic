<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>终止应用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>终止应用</h1>

<div class="summary">
    <p>
        <b>终止应用</b>动作终止后台运行的应用进程。<br/>
        <br/>
        <span class="warning">警告：</span> 操作系统不允许终止当前正在前台运行的应用。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当启动另一个应用以回收内存时，终止浏览器应用。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">包名</div>
    <div class="setting_description">要终止的包名。<a href="action_script.html#inline_expressions">支持变量。</a></div>

</div>

</body>

</html>
