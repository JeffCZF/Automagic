<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置蓝牙网络共享状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置蓝牙网络共享状态</h1>

<div class="summary">
    <p>
        动作 <b>设置蓝牙网络共享状态</b> 打开或关闭蓝牙网络共享设置。<br/>
        <br/>
        <span class="note">注意：</span> 此动作本身并不提供蓝牙网络共享功能，它只是打开设置。某些提供商移除了蓝牙网络共享功能。此动作<b>不能</b>在此类手机上打开网络共享。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
        <br/>
        <span class="warning">警告：</span> 此功能需要 Android 3+。
    </p>

    <p class="sample_separator">&nbsp;</p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">蓝牙网络共享</div>
    <div class="setting_description">是打开还是关闭蓝牙网络共享。</div>
</div>

</body>

</html>
