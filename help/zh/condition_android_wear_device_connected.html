<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Android Wear 设备已连接</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>Android Wear 设备已连接</h1>

<div class="summary">
    <p>
        条件 <b>Android Wear 设备已连接</b> 检查特定的 Android Wear 设备当前是否连接到主设备。<br/>
        <br/>
        <span class="warning">警告：</span>此功能并非 Android 官方支持，可能无法在所有设备上运行。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅在未连接到 Android Wear 设备时播放通知声音。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">Android Wear 设备</div>
    <div class="setting_description">目标设备。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>node_id</code></div>
    <div class="variable_description">Wear 节点的 ID</div>

    <div class="variable_name"><code>node_name</code></div>
    <div class="variable_description">Wear 设备的名称</div>
</div>

</body>

</html>
