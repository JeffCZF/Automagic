<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>启动应用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>启动应用</h1>

<div class="summary">
    <p>
        <b>启动应用</b>动作启动一个应用或应用的特定活动。<br/>
        <br/>
        <span class="tip">提示：</span> 某些活动需要特殊权限才能启动。如果某个活动无法启动，请在测试动作后检查日志。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>使用快捷方式直接启动开发设置。</li>
        <li>当您靠近购物中心时启动购物清单应用。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">包名</div>
    <div class="setting_description">要启动的包名。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">类名</div>
    <div class="setting_description">
        要启动的特定活动。<br/>
        留空以启动包的默认活动。<a href="action_script.html#inline_expressions">支持变量。</a>
    </div>

</div>

</body>

</html>
