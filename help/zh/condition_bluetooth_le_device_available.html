<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>蓝牙 LE 设备可用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>蓝牙 LE 设备可用</h1>

<div class="summary">
    <p>
        条件 <b>蓝牙 LE 设备可用</b> 执行 BT LE 扫描以测试设备当前是否可用。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每 10 分钟扫描一次 BT LE 信标是否可用，以在家中打开 WiFi。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">蓝牙设备地址</div>
    <div class="setting_description">蓝牙设备的地址。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">蓝牙设备名称</div>
    <div class="setting_description">蓝牙设备的名称。</div>

    <div class="setting_title">超时</div>
    <div class="setting_description">扫描的最大持续时间。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>rssi</code></div>
    <div class="variable_description">测量的信号强度，不可用时为 0</div>
</div>

</body>

</html>
