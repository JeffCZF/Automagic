<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>内容提供者已更改</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>内容提供者已更改</h1>

<div class="summary">
    <p>
        触发器 <b>内容提供者已更改</b> 在指定 URI 的内容提供者发生更改时执行。注意，并非所有内容提供者都支持此功能。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每当 MMS 数据库发生更改时接收通知，以便检查是否有新消息。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">内容 URI</div>
    <div class="setting_description">要获取更改的 URI（包括祖先）。</div>

    <div class="setting_title">通知后代</div>
    <div class="setting_description">是否也应检测后代 URI 中的更改。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>content_uri</code></div>
    <div class="variable_description">更改的实际 URI</div>
</div>

</body>

</html>
