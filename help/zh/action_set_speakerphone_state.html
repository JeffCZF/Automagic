<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置免提状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置免提状态</h1>

<div class="summary">
    <p>
        动作 <b>设置免提状态</b> 打开或关闭手机的免提功能。在大多数设备上，必须存在活动通话，此动作才能生效。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当有来电且手机处于车载底座中时打开免提。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">免提</div>
    <div class="setting_description">打开还是关闭免提。</div>
</div>

</body>

</html>
