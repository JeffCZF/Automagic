<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>自定义小部件叠加层正在显示</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>自定义小部件叠加层正在显示</h1>

<div class="summary">
    <p>
        条件 <b>自定义小部件叠加层正在显示</b> 检查特定自定义小部件当前是否作为叠加层显示。<br/>
        <br/>
        <span class="note">注意：</span>出于安全原因，Android 有时会暂时隐藏叠加层。此条件无法检测到这种情况，可能会认为小部件正在显示。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅在特定叠加层显示时执行流程的某些动作。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">叠加层名称列表</div>
    <div class="setting_description">要检查的叠加层的名称。当至少有一个叠加层正在显示时，条件评估为真。支持全局模式 (*, ?)。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
