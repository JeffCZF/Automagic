<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>添加WiFi接入点</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>添加WiFi接入点</h1>

<div class="summary">
    <p>
        <b>添加WiFi接入点</b>动作用于新增一个WiFi配置，并可选择是否立即连接至该网络。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>扫描包含WiFi连接信息的二维码，并直接连接到新的WiFi。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">SSID</div>
    <div class="setting_description">接入点的SSID。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">安全类型</div>
    <div class="setting_description">选择加密方式：WEP、WPA或不加密。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">连接密码</div>
    <div class="setting_description">连接的密码。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">启动连接</div>
    <div class="setting_description">是否立即连接至新的WiFi网络。</div>
</div>

</body>

</html>
