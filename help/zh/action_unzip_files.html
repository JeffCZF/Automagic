<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>解压文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>解压文件</h1>

<div class="summary">
    <p>
        动作 <b>解压文件</b> 将 ZIP 文件中包含的所有文件和文件夹解压到指定的目标文件夹。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>将 <code>archive.zip</code> 中的所有文件解压到目录 <code>/mnt/sdcard/xyz/</code>。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">ZIP 文件</div>
    <div class="setting_description">
        要解压缩的 ZIP 文件。<a href="action_script.html#inline_expressions">支持变量。</a>
    </div>

    <div class="setting_title">目标目录</div>
    <div class="setting_description">
        要将存档解压缩到的目标目录的绝对路径。<a href="action_script.html#inline_expressions">支持变量。</a>
    </div>

    <div class="setting_title">显示进度通知</div>
    <div class="setting_description">是否在状态栏上显示指示操作进度的通知。</div>
</div>

</body>

</html>
