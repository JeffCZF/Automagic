<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>接听来电</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>接听来电</h1>

<div class="summary">
    <p>
        <b>接听来电</b>动作用于接听当前正在响铃的电话。<br/>
        <br/>
        <span class="warning">提示：</span>此功能需要 root 权限，未经 Android 官方支持，且可能无法在所有设备上正常使用。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当准备接听电话但无法腾出双手时，自动接听来电。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">接听方式</div>
    <div class="setting_description">定义用于接听电话的具体方式。</div>
</div>

</body>

</html>
