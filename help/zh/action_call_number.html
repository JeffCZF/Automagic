<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>拨打电话</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>拨打电话号码</h1>

<div class="summary">
    <p>
        <b>拨打电话号码</b>动作用于通过打开电话应用程序直接拨打指定号码。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在下午6点自动拨打指定联系人的电话。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">SIM卡</div>
    <div class="setting_description">选择使用的SIM卡。</div>

    <div class="setting_title">电话号码</div>
    <div class="setting_description">需要拨打的号码。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">自动拨号</div>
    <div class="setting_description">选择是否自动拨打电话，或仅打开拨号界面但不拨号。</div>
</div>

</body>

</html>
