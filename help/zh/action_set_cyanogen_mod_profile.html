<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置 Cyanogen/LineageOS 配置文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置 Cyanogen/LineageOS 配置文件</h1>

<div class="summary">
    <p>
        动作 <b>设置 Cyanogen/LineageOS 配置文件</b> 更改当前设置的 Cyanogen/LineageOS 配置文件。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当 WiFi 连接时，将配置文件更改为“在家”。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">配置文件名称</div>
    <div class="setting_description">要激活的配置文件的名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
