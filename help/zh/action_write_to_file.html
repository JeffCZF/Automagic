<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>写入文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>写入文件</h1>

<div class="summary">
    <p>
        动作 <b>写入文件</b> 将定义的文本写入指定的文件。当文件尚不存在时，该动作会自动创建文件。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每 20 分钟将您的位置记录到一个文件中。</li>
        <li>将所有收到的短信写入一个文件。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">文件</div>
    <div class="setting_description">要将文本写入的文件。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">文本</div>
    <div class="setting_description">要写入文件的文本。文本可以包含多行。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">追加</div>
    <div class="setting_description">是将文本追加到文件末尾，还是覆盖文件。</div>
</div>

</body>

</html>
