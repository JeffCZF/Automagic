<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>解除滑动解锁屏幕锁定</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>解除滑动解锁屏幕锁定</h1>

<div class="summary">
    <p>
        动作 <b>解除滑动解锁屏幕锁定</b> 在使用滑动解锁屏幕锁定时解锁设备。此操作无法解除需要输入密码、PIN 或图案的安全屏幕锁定。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。<br/>
        某些设备需要关闭屏幕才能解除屏幕锁定。<br/>
        某些设备在解除屏幕锁定时会关闭屏幕。您可以通过在解除屏幕锁定后在流程中添加一个动作 <em>开启屏幕</em> 来缓解此问题。
    </p>
</div>

</body>

</html>
