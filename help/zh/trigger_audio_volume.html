<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>音频音量</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>音频音量</h1>

<div class="summary">
    <p>
        触发器 <b>音频音量</b> 在设备的音量已更改时执行。某些设备会稍微延迟报告音量更改。<br/>
        <br/>
        <span class="warning">警告：</span>此功能并非 Android 官方支持，可能无法在所有设备上运行。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每当音量更改时振动。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">声音类型</div>
    <div class="setting_description">要检查的音频流的类型。</div>

    <div class="setting_title">条件</div>
    <div class="setting_description">条件是检查音量是高于还是低于音量水平。</div>

    <div class="setting_title">音量</div>
    <div class="setting_description">要检查的音量值。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>volume</code></div>
    <div class="variable_description">新的音量值</div>

    <div class="variable_name"><code>old_volume</code></div>
    <div class="variable_description">更改前的音量值</div>
</div>

</body>

</html>
