<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>省电模式已启用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>省电模式已启用</h1>

<div class="summary">
    <p>
        条件 <b>省电模式已启用</b> 检查省电模式是否处于活动状态（Android 5+）。<br/>
        <span class="warning">警告：</span>此功能不适用于制造商特定的省电模式，例如三星的（超级）省电模式或索尼、HTC 的特定模式。在此类设备上请使用动作 <b>Init Variable System Setting</b>。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅在省电模式未激活时执行耗电大的流程。</li>
    </ul>
</div>

</body>

</html>
