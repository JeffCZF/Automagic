<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>底座事件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>底座事件</h1>

<div class="summary">
    <p>
        触发器 <b>底座事件</b> 在设备放入底座（车载、桌面、某些外部硬件键盘）时执行。<br/>
        <br/>
        可以使用条件 <b>底座状态</b> 来区分底座类型。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当设备放入底座时提高音频音量。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">已插入底座/已拔出底座</div>
    <div class="setting_description">
        <b>已插入底座</b><br/>
        选择后在设备已放入底座后执行流程。<br/>
        <br/>
        <b>已拔出底座</b><br/>
        选择后在设备已从底座移除后执行流程。<br/>
        <br/>
    </div>

</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>dock_state</code></div>
    <div class="variable_description">状态/底座类型</div>
</div>

</body>

</html>
