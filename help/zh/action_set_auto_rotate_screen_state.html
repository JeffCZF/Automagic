<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置加速计旋转</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置加速计旋转</h1>

<div class="summary">
    <p>
        动作 <b>设置加速计旋转</b> 打开或关闭 <b>自动旋转屏幕</b> 设置。<br/>
        <br/>
        <span class="note">注意：</span> 即使此设置关闭，应用也可以请求使用加速计来改变屏幕方向。
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">自动旋转屏幕</div>
    <div class="setting_description">系统是否应根据设备方向自动旋转屏幕。</div>
</div>

</body>

</html>
