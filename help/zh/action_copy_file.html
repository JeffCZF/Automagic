<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>复制文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>复制文件</h1>

<div class="summary">
    <p>
        <b>复制文件</b>动作在本地复制文件。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每周创建 Automagic 流程的备份，文件名包含时间戳。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">源文件</div>
    <div class="setting_description">要复制的文件的绝对路径。<a href="action_script.html#inline_expressions">支持变量。</a>
        <br/>
        示例：
        <ul>
            <li><code>/mnt/sdcard/export_<wbr/>{triggertime,<wbr/>dateformat,<wbr/>yyyy_MM_dd}<wbr/>.csv</code> 变为 <code>/mnt/sdcard/<wbr/>export_2011_02_13.csv</code></li>
        </ul>
    </div>

    <div class="setting_title">目标文件（包含文件名）</div>
    <div class="setting_description">目标文件的绝对路径。路径必须包含目标文件的文件名。<a href="action_script.html#inline_expressions">支持变量。</a></div>

</div>

</body>

</html>
