<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置 WiFi 接入点优先级</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置 WiFi 接入点优先级</h1>

<div class="summary">
    <p>
        动作 <b>设置 WiFi 接入点优先级</b> 设置接入点配置的优先级，以控制手机选择连接哪个接入点。<br/>
        <br/>
        <span class="note">注意：</span>设备用于确定使用哪个接入点以及设备是否会重新连接到另一个接入点的算法未知，并且可能因设备、版本和制造商而异。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当两个接入点都可用时，优先选择免费接入点而非付费接入点。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">SSID</div>
    <div class="setting_description">要修改的接入点配置的 SSID。</div>

    <div class="setting_title">优先级</div>
    <div class="setting_description">要使用的优先级。</div>

</div>

</body>

</html>
