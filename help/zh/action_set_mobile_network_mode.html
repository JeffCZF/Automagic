<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置移动网络模式（2G/3G）</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置移动网络模式（2G/3G）</h1>

<div class="summary">
    <p>
        动作 <b>设置移动网络模式（2G/3G）</b> 更改手机的网络模式。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>
</div>


<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">移动网络模式</div>
    <div class="setting_description">要使用的网络模式。带删除线的值很可能不受设备支持。</div>
</div>


</body>

</html>
