<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>开始屏幕录制（实验性）</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>开始屏幕录制（实验性）</h1>

<div class="summary">
    <p>
        动作 <b>开始屏幕录制（实验性）</b> 开始将屏幕录制为视频到定义的文件中。同一时间只能有一个录制会话处于活动状态。<br/>
        可以通过显示的状态栏通知手动停止录制，或者通过执行动作 <b>停止屏幕录制</b> 来停止。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当设备被盗时录制屏幕几秒钟。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">分辨率</div>
    <div class="setting_description">分辨率。</div>

    <div class="setting_title">比特率</div>
    <div class="setting_description">比特率。</div>

    <div class="setting_title">文件</div>
    <div class="setting_description">用于存储录制视频的文件的路径。建议文件扩展名为 <code>mp4</code>。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">录制音频</div>
    <div class="setting_description">是否使用设备麦克风录制音频。</div>

    <div class="setting_title">显示状态栏通知以停止录制</div>
    <div class="setting_description">启用后，会显示状态栏通知以停止录制。</div>
</div>


</body>

</html>
