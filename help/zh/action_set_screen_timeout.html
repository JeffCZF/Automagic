<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置屏幕超时</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置屏幕超时</h1>

<div class="summary">
    <p>
        动作 <b>设置屏幕超时</b> 更改屏幕超时时间。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当浏览器启动时将屏幕超时提高到 <b>10 分钟</b>。</li>
        <li>当电量几乎耗尽时将屏幕超时降低到 <b>15 秒</b>。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">屏幕超时</div>
    <div class="setting_description">
        要设置的新屏幕超时时间。<br/>
        <br/>
        <span class="note">注意：</span>并非所有设备都支持所有超时值。部分设备在打开 Android 设置页面后会立即将值舍入到最接近的数值。其他设备在不支持该值时可能会将值修改为最小值（15 秒）。
    </div>

</div>

</body>

</html>
