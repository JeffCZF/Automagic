<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>位置提供者已启用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>位置提供者已启用</h1>

<div class="summary">
    <p>
        条件 <b>位置提供者已启用</b> 检查特定的位置提供者（如 GPS）是否已启用。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅在 GPS 处于活动状态时通过短信报告您的位置。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">位置提供者</div>
    <div class="setting_description">要检查的位置提供者。<br/>
        <br/>
        <b>网络</b><br/>
        此提供者使用由蜂窝塔和 Wi-Fi 信号提供的位置。根据环境，此提供者可以提供大约 60 米精度的位置。使用蜂窝塔查找的位置可能非常不准确（可达数公里或英里）。<br/>
        <br/>
        <b>被动</b><br/>
        此提供者从当前活动的提供者（网络或 GPS）提供位置，而自身不激活任何提供者。这可能导致位置更新非常不频繁。<br/>
        <br/>
        <b>GPS</b><br/>
        此提供者使用 GPS 接收器提供位置。此提供者通常比网络提供者消耗更多电量。<br/>
        <br/>
    </div>
</div>

</body>

</html>
