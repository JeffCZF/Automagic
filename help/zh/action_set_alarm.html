<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置闹钟</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置闹钟</h1>

<div class="summary">
    <p>
        动作 <b>设置闹钟</b> 在设备上可用的闹钟应用中创建一个闹钟。<br/>
        <br/>
        <span class="warning">警告：</span> 并非所有闹钟应用都支持所有选项。
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">标签</div>
    <div class="setting_description">闹钟中使用的标签。并非所有闹钟应用都支持。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">小时（0–23）</div>
    <div class="setting_description">闹钟中使用的小时。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">分钟（0–59）</div>
    <div class="setting_description">闹钟中使用的分钟。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">闹钟铃声</div>
    <div class="setting_description">要播放的闹钟铃声。并非所有闹钟应用都支持。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">振动</div>
    <div class="setting_description">设备是否应振动。并非所有闹钟应用都支持。</div>

    <div class="setting_title">跳过界面</div>
    <div class="setting_description">设置闹钟后是否应显示闹钟应用。并非所有闹钟应用都支持。</div>
</div>

</body>

</html>
