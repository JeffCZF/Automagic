<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Gleeo 停止记录</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>Gleeo 停止记录</h1>

<div class="summary">
    <p>
        <b>Gleeo 停止记录</b>动作停止记录 <b>Gleeo Time Tracker</b> 中当前正在记录的任务。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当您离开办公室时停止计时。</li>
        <li>每晚 6 点停止计时，并在您忘记停止记录时显示警报。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">要停止的域</div>
    <div class="setting_description">
        要停止记录的域名。<br/>
        支持通配符模式。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
    </div>

    <div class="setting_title">要停止的项目</div>
    <div class="setting_description">
        要停止记录的项目名称。<br/>
        支持通配符模式。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
    </div>

    <div class="setting_title">要停止的任务</div>
    <div class="setting_description">
        要停止记录的任务。<br/>
        支持通配符模式。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
    </div>

    <div class="setting_title">移至后台</div>
    <div class="setting_description">停止任务后是否将 <b>Gleeo Time Tracker</b> 移至后台。</div>
</div>

</body>

</html>
