<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>隐藏自定义小工具覆盖层</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>隐藏自定义小工具覆盖层</h1>

<div class="summary">
    <p>
        <b>隐藏自定义小工具覆盖层</b>动作隐藏之前显示的覆盖层。<br/>
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">覆盖层名称</div>
    <div class="setting_description">要隐藏的覆盖层的名称/标识。</div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>widget_x_offset</code></div>
    <div class="variable_description">隐藏小工具的 X 偏移量。</div>

    <div class="variable_name"><code>widget_y_offset</code></div>
    <div class="variable_description">隐藏小工具的 Y 偏移量。</div>
</div>

</body>

</html>
