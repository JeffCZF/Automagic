<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>消息对话框</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>消息对话框</h1>

<div class="summary">
    <p>
        <b>消息对话框</b>动作显示一个带有消息和可选标题的对话框。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>直接在对话框中显示收到的短信文本。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">标题</div>
    <div class="setting_description">对话框的可选标题。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">消息</div>
    <div class="setting_description">要在对话框中显示的消息。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">按钮标签</div>
    <div class="setting_description">按钮的标签。当文本为空时不显示按钮。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">激活超时</div>
    <div class="setting_description">是否应在指定时间后自动隐藏超时。</div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">自动关闭对话框并继续流程的时间量。</div>
</div>

</body>

</html>
