<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置壁纸</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置壁纸</h1>

<div class="summary">
    <p>
        动作 <b>设置壁纸</b> 将手机壁纸更改为定义的静态图像。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在家时更换壁纸。</li>
        <li>收到短信时更换壁纸。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">壁纸图像路径</div>
    <div class="setting_description">要用作壁纸的图像文件的路径。<a href="action_script.html#inline_expressions">支持变量。</a></div>

</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>wallpaper_path</code></div>
    <div class="variable_description">设置的壁纸的路径</div>
</div>

</body>

</html>
