<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>自动同步已启用</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>自动同步已启用</h1>

<div class="summary">
    <p>
        条件 <b>自动同步已启用</b> 检查自动同步是全局开启或关闭（主开关），还是针对特定账户/授权开启或关闭。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>检查自动同步的当前状态，以将设置切换为相反的值。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">全局或特定</div>
    <div class="setting_description">是检查全局主开关还是检查特定账户/授权。</div>

    <div class="setting_title">账户</div>
    <div class="setting_description">要检查的账户，格式为 <em>类型</em>:<em>名称</em>。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">授权</div>
    <div class="setting_description">要检查的账户部分/数据库。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
