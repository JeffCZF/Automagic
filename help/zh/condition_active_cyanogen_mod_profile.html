<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>活动的 Cyanogen/LineageOS 情景模式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>活动的 Cyanogen/LineageOS 情景模式</h1>

<div class="summary">
    <p>
        条件 <b>活动的 Cyanogen/LineageOS 情景模式</b> 检查列出的情景模式之一是否处于活动状态。<br/>
        <br/>
        <span class="warning">警告：</span>此功能并非 Android 官方支持，可能无法在所有设备上运行。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅当活动的情景模式不是“影院”时才播放声音。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">情景模式名称列表</div>
    <div class="setting_description">要检查的情景模式名称。支持全局模式 (*, ?)。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>profile_name</code></div>
    <div class="variable_description">活动情景模式的名称</div>
</div>

</body>

</html>
