<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置音频流音量</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置音频流音量</h1>

<div class="summary">
    <p>
        动作 <b>设置音频流音量</b> 更改特定类型的音频流的音量。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当您在办公室时降低铃声音量。</li>
        <li>插入耳机时增加音乐音量。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">声音类型</div>
    <div class="setting_description">要调整的音频流类型。</div>

    <div class="setting_title">更改类型</div>
    <div class="setting_description">是设置绝对值，还是提高、降低、静音或取消静音音量。选择“保持不变”可以仅显示音量级别弹窗。</div>

    <div class="setting_title">音量</div>
    <div class="setting_description">要使用的音量级别。不同音频流的最大级别不同。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">播放声音</div>
    <div class="setting_description">执行动作时是否播放短暂的音量调节声音。某些设备在音量更改时从不播放声音。</div>

    <div class="setting_title">显示音量级别弹窗</div>
    <div class="setting_description">是否显示指示新音量级别的弹窗。</div>
</div>

</body>

</html>
