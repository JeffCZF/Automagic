<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置电话无线通信状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置电话无线通信状态</h1>

<div class="summary">
    <p>
        动作 <b>设置电话无线通信状态</b> 打开或关闭手机无线通信。<br/>
        <br/>
        <span class="warning">警告：</span>此功能需要 root 权限，并非 Android 官方支持，可能无法在所有设备上运行。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在夜间关闭无线通信以节省电量。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">方法</div>
    <div class="setting_description">定义用于打开/关闭无线通信的方法。</div>

    <div class="setting_title">电话无线通信</div>
    <div class="setting_description">打开还是关闭无线通信。</div>
</div>

</body>

</html>
