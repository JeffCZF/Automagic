<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置飞行模式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置飞行模式</h1>

<div class="summary">
    <p>
        动作 <b>设置飞行模式</b> 打开或关闭手机的飞行模式。<br/>
        <br/>
        <span class="warning">警告：</span> 从 Android 4.2 开始，此功能需要 root 权限，且不受 Android 官方支持。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>晚上开启飞行模式以减少辐射。</li>
        <li>当电量低于 20% 时开启飞行模式以减少电池使用。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">方法</div>
    <div class="setting_description">用于切换飞行模式的方法。哪种方法效果更好高度依赖于设备。</div>

    <div class="setting_title">开启/关闭飞行模式</div>
    <div class="setting_description">是打开还是关闭飞行模式。</div>
</div>

</body>

</html>
