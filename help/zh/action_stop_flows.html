<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>停止流程</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>停止流程</h1>

<div class="summary">
    <p>
        动作 <b>停止流程</b> 尽快停止在 <b>流程模式列表</b> 字段中指定的一个或多个流程。使用动作 <b>设置流程状态</b> 来禁用流程。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>摇晃设备时停止唤醒流程。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>
    <div class="setting_title">流程模式列表</div>
    <div class="setting_description">要停止的流程名称的逗号分隔列表。可以使用全局模式 <code>*</code> 和 <code>?</code> 来匹配名称相似的流程。<br/>
        <br/>
        示例：
        <ul>
            <li><code>测试流程</code></li>
            <li><code>测试流程, 短信流程</code></li>
            <li><code>*省电*</code></li>
        </ul>
    </div>

    <div class="setting_title">排除流程模式列表</div>
    <div class="setting_description">一个逗号分隔的流程名称列表，即使 <b>流程模式列表</b> 字段包含了这些流程，也 <b>不</b> 停止它们。</div>

</div>

</body>

</html>
