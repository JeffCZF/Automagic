<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>发送 USSD 请求</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>发送 USSD 请求</h1>

<div class="summary">
    <p>
        动作 <b>发送 USSD 请求</b> 向提供商发送 USSD 请求。<br/>
        <br/>
        <span class="warning">警告：</span> 某些版本的 Android 不能正确处理 USSD 请求失败，因此当 USSD 请求失败时，可能会显示系统的对话框，导致动作在 30 秒后超时。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>查询预付费余额。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">SIM 卡</div>
    <div class="setting_description">SIM 卡。</div>

    <div class="setting_title">USSD 请求</div>
    <div class="setting_description">要发送的请求。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>ussd_failure_code</code>（仅在出错时提供）</div>
    <div class="variable_description"></div>

    <div class="variable_name"><code>ussd_response</code>（仅在成功时提供）</div>
    <div class="variable_description">响应文本</div>
</div>

</body>

</html>
