<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>时间范围</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>时间范围</h1>

<div class="summary">
    <p>
        条件 <b>时间范围</b> 在当前时间处于定义的时间范围内时为真。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>仅在白天播放提醒。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">工作日</div>
    <div class="setting_description">条件应检查时间范围的日子。</div>

    <div class="setting_title">从 - 到</div>
    <div class="setting_description">时间范围的开始和时间范围的结束。小于"从"时间的"到"时间会将"到"时间移到第二天，以简化跨越午夜的时间范围检查。</div>
</div>

</body>

</html>
