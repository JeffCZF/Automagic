<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>蓝牙设备已断开</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>蓝牙设备已断开</h1>

<div class="summary">
    <p>
        触发器 <b>蓝牙设备已断开</b> 在蓝牙设备断开连接时执行。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当蓝牙耳机断开连接时调高音量。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">蓝牙设备</div>
    <div class="setting_description">定义触发器是否应为所有设备执行还是仅针对特定设备执行。</div>

    <div class="setting_title">蓝牙设备地址</div>
    <div class="setting_description">蓝牙设备的地址。</div>

    <div class="setting_title">蓝牙设备名称</div>
    <div class="setting_description">蓝牙设备的名称。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>name</code></div>
    <div class="variable_description">设备名称</div>

    <div class="variable_name"><code>address</code></div>
    <div class="variable_description">设备地址</div>

    <div class="variable_name"><code>bluetooth_class</code></div>
    <div class="variable_description">设备的蓝牙类别</div>

    <div class="variable_name"><code>bond_state</code></div>
    <div class="variable_description">设备的绑定状态</div>
</div>

</body>

</html>
