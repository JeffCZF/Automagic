<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>删除 HTTP 请求 Cookie</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>删除 HTTP 请求 Cookie</h1>

<div class="summary">
    <p>
        动作 <b>删除 HTTP 请求 Cookie</b> 删除指定域名的 Cookie，这些 Cookie 由 Automagic 在执行 <em>HTTP 请求</em> 动作时存储。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>删除所有 Cookie，确保下一个请求中不发送任何 Cookie。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">域名列表</div>
    <div class="setting_description">要删除 Cookie 的域名的逗号分隔列表。支持通配符模式（*、?）。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
