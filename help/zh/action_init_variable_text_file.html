<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量文本文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量文本文件</h1>

<div class="summary">
    <p>
        <b>初始化变量文本文件</b>动作将文本文件的内容读入指定的变量。支持最大 1MB 的文件。不支持二进制文件。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>读取包含邮件模板的文本文件，并通过邮件发送文本。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">文件</div>
    <div class="setting_description">要加载的文件的路径。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">编码</div>
    <div class="setting_description">用于将文件字节解码为文本的编码。</div>

    <div class="setting_title">变量</div>
    <div class="setting_description">用于存储文本的变量名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">去除 BOM</div>
    <div class="setting_description">是否应从结果字符串中删除可能在 UTF 编码文件开头找到的 BOM（字节顺序标记）。</div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>file_text</code></div>
    <div class="variable_description">用于存储文本的变量名称</div>


</div>

</body>

</html>
