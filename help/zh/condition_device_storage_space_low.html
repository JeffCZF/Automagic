<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设备存储空间不足</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设备存储空间不足</h1>

<div class="summary">
    <p>
        条件 <b>设备存储空间不足</b> 检查设备内部存储器的可用空间是否不足。<br/>
        <br/>
        <span class="note">注意：</span>视为不足的可用空间量由设备制造商定义。<br/>
        标准 Android 将少于 10% 的内部可用内存视为不足。
    </p>

    示例：
    <ul>
        <li>当设备存储空间不足时，每 5 分钟播放一次警告声。</li>
    </ul>

</div>

</body>

</html>
