<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>连接/断开蓝牙设备</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>连接/断开蓝牙设备</h1>

<div class="summary">
    <p>
        <b>连接/断开蓝牙设备</b>动作尝试连接或断开已配对的蓝牙设备（需要 Android 3+）。<br/>
        <br/>
        <span class="warning">警告：</span>此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>按下快捷方式时连接到蓝牙耳机。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">蓝牙配置文件</div>
    <div class="setting_description">定义要建立的连接类型。</div>

    <div class="setting_title">蓝牙设备地址</div>
    <div class="setting_description">蓝牙设备的地址。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">蓝牙设备名称</div>
    <div class="setting_description">蓝牙设备的名称。</div>

    <div class="setting_title">连接或断开</div>
    <div class="setting_description">选择是连接还是断开。</div>
</div>

</body>

</html>
