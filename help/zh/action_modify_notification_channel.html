<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>修改通知通道</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>修改通知通道</h1>

<div class="summary">
    <p>
        <b>修改通知通道</b>动作修改通知通道。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>将有关应用更新的通知更改为白天重要、夜间不重要，以避免夜间中断。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">包名</div>
    <div class="setting_description">要修改其设置的应用的包名。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">通知通道 ID</div>
    <div class="setting_description">通道的 ID。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">重要性</div>
    <div class="setting_description">通知应被如何对待的重要性。</div>

    <div class="setting_title">声音</div>
    <div class="setting_description">要播放的声音。</div>

    <div class="setting_title">锁屏可见性</div>
    <div class="setting_description">通知在锁屏上应如何显示。</div>

    <div class="setting_title">显示通知点</div>
    <div class="setting_description">是否显示通知点。</div>

    <div class="setting_title">覆盖勿扰模式</div>
    <div class="setting_description">是否忽略勿扰模式。</div>

    <div class="setting_title">振动</div>
    <div class="setting_description">通知是否应振动。</div>

    <div class="setting_title">闪烁 LED</div>
    <div class="setting_description">通知是否应激活通知灯。</div>
</div>

</body>

</html>
