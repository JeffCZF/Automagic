<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>发布 Twitter 私信</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>发布 Twitter 私信</h1>

<div class="summary">
    <p>
        <b>发布 Twitter 私信</b>动作向一个收件人发送 Twitter 私信。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每小时将您的位置推文发送给您的妻子。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">Twitter 帐户</div>
    <div class="setting_description">用于发送消息的 Twitter 帐户。</div>

    <div class="setting_title">收件人</div>
    <div class="setting_description">私信的收件人（不带前导 @）。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">消息</div>
    <div class="setting_description">要发送的消息。<a href="action_script.html#inline_expressions">支持变量。</a></div>

</div>

</body>

</html>
