<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置夜间模式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置夜间模式</h1>

<div class="summary">
    <p>
        动作 <b>设置夜间模式</b> 打开或关闭设备的夜间模式，或根据时间和位置激活自动切换。只有在设备上启用了车载或桌面模式时，对夜间模式的更改才有效。<br/>
        <span class="note">注意：</span> 并非所有设备都支持。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>晚上 10 点激活设备的夜间模式，早上 6 点恢复正常模式。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">夜间模式</div>
    <div class="setting_description">是打开夜间模式、关闭夜间模式，还是让设备根据时间和位置处理模式切换。</div>

</div>

</body>

</html>
