<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>底座状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>底座状态</h1>

<div class="summary">
    <p>
        条件 <b>底座状态</b> 检查设备是否处于底座状态之一。
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">底座状态</div>
    <div class="setting_description">
        接受的底座状态。
        <ul>
            <li><b>车载底座</b>：在车载底座中</li>
            <li><b>桌面底座</b>：在桌面底座中</li>
            <li><b>桌面底座（高端，数字）</b>：在高端数字底座中</li>
            <li><b>桌面底座（低端，模拟）</b>：在低端模拟底座中</li>
            <li><b>特殊底座</b>：在特殊底座中，如 ASUS Transformer 的硬件键盘</li>
            <li><b>未插入底座</b>：不在底座中</li>
        </ul>
    </div>
</div>

</body>

</html>
