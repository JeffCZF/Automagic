<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>WiFi 已断开</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>WiFi 已断开</h1>

<div class="summary">
    <p>
        触发器 <b>WiFi 已断开</b> 在与定义网络的连接断开时执行。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当 WiFi 不再可用时播放提醒。</li>
        <li>关闭导致大数据传输的流程。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>
    <div class="setting_title">SSID 列表</div>
    <div class="setting_description">断开连接时执行流程的 SSID 列表。列表可以包含 glob 模式字符，如 <code>*</code> 和 <code>?</code>。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>bssid</code></div>
    <div class="variable_description">已断开 WiFi 网络的 BSSID</div>

    <div class="variable_name"><code>ssid</code></div>
    <div class="variable_description">已断开 WiFi 网络的 SSID</div>
</div>

</body>

</html>
