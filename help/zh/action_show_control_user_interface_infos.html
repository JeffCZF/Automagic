<h1>显示控制界面信息</h1>

<div class="summary">
    <p>
        动作 <b>显示控制界面信息</b> 显示用于录制点击以模拟用户交互的对话框（如动作 <b>控制界面-&gt;显示叠加层控制-&gt;信息</b>）<br/>
    </p>

    <ul>
        <li>延迟后显示录制界面，以防红色按钮阻止导航到所需的目标界面。</li>
    </ul>
