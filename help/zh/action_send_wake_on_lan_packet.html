<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>发送唤醒局域网数据包</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>发送唤醒局域网数据包</h1>

<div class="summary">
    <p>
        动作 <b>发送唤醒局域网数据包</b> 使用 UDP 向指定的 IP 地址和端口发送唤醒局域网数据包。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每天上午 6 点启动您的 NAS（网络附加存储）。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">MAC 地址</div>
    <div class="setting_description">要发送数据包的 MAC 地址。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">IP/端口</div>
    <div class="setting_description">要发送数据包的 IP 地址。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
