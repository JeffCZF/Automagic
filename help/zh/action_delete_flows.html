<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>删除流程</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>删除流程</h1>

<div class="summary">
    <p>
        动作 <b>删除流程</b> 删除指定的流程。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在使用动作 <b>导入流程/小工具</b> 再次导入流程之前，删除一个流程。</li>
    </ul>

</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">流程名称列表</div>
    <div class="setting_description">要删除的流程名称的逗号分隔列表。<em>不支持</em>通配符模式。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">删除未使用的对象</div>
    <div class="setting_description">是否同时删除未被其他流程使用的触发器、条件和动作。</div>
</div>

</body>

</html>
