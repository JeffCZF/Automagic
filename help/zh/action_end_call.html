    <title>结束通话</title>

<body>

<h1>结束通话</h1>

<div class="summary">
    <p>
        <b>结束通话</b>动作挂断当前通话。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
        <br/>
        <span class="warning">警告：</span> 在某些设备上，此功能需要 root 权限。
    </p>

    示例：
    <ul>
        <li>让电话拨打回家 15 秒，然后自动终止通话以通知某事。</li>
    </ul>

</div>

</body>

</html>
