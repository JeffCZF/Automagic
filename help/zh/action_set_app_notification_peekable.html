<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置应用通知可窥视性</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置应用通知可窥视性</h1>

<div class="summary">
    <p>
        动作 <b>设置应用通知可窥视性</b> 更改应用的通知是否可以通过短暂滑入视图来强调的设置。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能需要 root 权限，不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在观看电影时，为某些应用关闭可窥视性设置。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">包名</div>
    <div class="setting_description">要更改通知可窥视性设置的包名。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
