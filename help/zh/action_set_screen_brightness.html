<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置屏幕亮度</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置屏幕亮度</h1>

<div class="summary">
    <p>
        动作 <b>设置屏幕亮度</b> 更改屏幕亮度。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当电量低于 50% 时调低屏幕亮度。</li>
        <li>当电源适配器连接时将屏幕亮度调至最大。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">自动亮度</div>
    <div class="setting_description">是否使用自动亮度，还是使用下方滑块指定的值。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">自适应亮度</div>
    <div class="setting_description">
        是否应将自适应亮度更改为定义的值。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
        <br/>
        <span class="warning">警告：</span>此功能并非 Android 官方支持，可能无法在所有设备上运行。
    </div>

    <div class="setting_title">强制更新</div>
    <div class="setting_description">是否确保系统立即应用新值。否则在某些 Android 版本上，更改可能会在下次屏幕开启时生效。禁用此选项可避免部分设备上的闪烁问题。</div>
</div>

</body>

</html>
