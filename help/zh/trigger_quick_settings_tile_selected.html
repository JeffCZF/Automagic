<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>快捷设置磁贴已选中</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>快捷设置磁贴已选中</h1>

<div class="summary">
    <p>
        触发器 <b>快捷设置磁贴已选中</b> 配置选定的快捷设置磁贴，并在磁贴被选中/点击时执行。<br/>
        <br/>
        <span class="tip">提示：</span>动作 <b>更新快捷设置磁贴</b> 可用于更改磁贴的图标、标签或状态。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>创建一个 QS 磁贴，用于发送包含当前位置的短信。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">磁贴</div>
    <div class="setting_description">要使用的磁贴。</div>

    <div class="setting_title">图标</div>
    <div class="setting_description">用于磁贴的图标。<a href="action_script.html#inline_expressions">支持变量（在触发器激活时替换）。</a></div>

    <div class="setting_title">标签</div>
    <div class="setting_description">磁贴的标签。<a href="action_script.html#inline_expressions">支持变量（在触发器激活时替换）。</a></div>

    <div class="setting_title">折叠面板</div>
    <div class="setting_description">选中/点击磁贴时是否应关闭快捷设置区域。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>
</div>

</body>

</html>
