<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置蓝牙 SCO 状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置蓝牙 SCO 状态</h1>

<div class="summary">
    <p>
        动作 <b>设置蓝牙 SCO 状态</b> 打开或关闭用于通信的蓝牙 SCO。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>即使已连接耳机也关闭蓝牙 SCO。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">蓝牙 SCO</div>
    <div class="setting_description">
        是打开还是关闭蓝牙 SCO。<br/>
        <br/>
        勾选 <b>启动蓝牙 SCO</b> 可将音频路由到蓝牙设备，或勾选 <b>停止蓝牙 SCO</b> 可在之前由 Automagic 启动时停止将音频路由到蓝牙设备。<br/>
        <br/>
        <span class="note">注意：</span> 并非所有设备都支持启动/停止蓝牙 SCO，并且已知在某些设备上存在问题。
    </div>
</div>

</body>

</html>
