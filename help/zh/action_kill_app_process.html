<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>终止应用进程</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>终止应用进程</h1>

<div class="summary">
    <p>
        <b>终止应用进程</b>动作使用 <code>kill</code> 命令向进程发送定义的信号。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能需要 root 权限，不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当启动另一个应用以回收内存时，终止浏览器应用。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">包名</div>
    <div class="setting_description">要终止的包名。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">信号</div>
    <div class="setting_description">要发送的信号。</div>

</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>pid</code></div>
    <div class="variable_description">进程 ID</div>

    <div class="variable_name"><code>importance</code></div>
    <div class="variable_description">进程的重要性。值越小，重要性越高。</div>

    <div class="variable_name"><code>lru</code></div>
    <div class="variable_description">最近最少使用。值越小表示最近使用越多。</div>

    <div class="variable_name"><code>uid</code></div>
    <div class="variable_description">进程的用户 ID</div>
</div>

</body>

</html>
