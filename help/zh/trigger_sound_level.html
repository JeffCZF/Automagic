<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>声音级别（实验性）</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>声音级别（实验性）</h1>

<div class="summary">
    <p>
        触发器 <b>声音级别（实验性）</b> 在环境中录制的声音级别超过某一水平时执行。<br/>
        <br/>
        <span class="warning">警告：</span>此条件使用设备的麦克风录制环境声音，当另一个应用已使用麦克风时，该功能无法正常工作。
   </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">平均值</div>
    <div class="setting_description">是应考虑当前声音级别，还是录制和计算声音级别的持续时间。</div>

    <div class="setting_title">灵敏度</div>
    <div class="setting_description">用于定义声音级别的滑块的灵敏度。</div>

    <div class="setting_title">声音级别</div>
    <div class="setting_description">要检查的声音级别。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>sound_level</code></div>
    <div class="variable_description">检测到的声音级别</div>
</div>

</body>

</html>
