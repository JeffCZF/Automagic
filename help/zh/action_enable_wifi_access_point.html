<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>启用 WiFi 接入点</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>启用 WiFi 接入点</h1>

<div class="summary">
    <p>
        <b>启用 WiFi 接入点</b>动作启用其中一个接入点配置，并可选择通过禁用其他接入点来阻止连接到它们。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在家中启用免费接入点，并禁用付费接入点。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">SSID</div>
    <div class="setting_description">要启用的接入点配置的 SSID。当未启用 <b>禁用其他接入点</b> 时，支持通配符模式（*、?）。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">禁用其他接入点</div>
    <div class="setting_description">是否禁用所有其他接入点配置。</div>
</div>

</body>

</html>
