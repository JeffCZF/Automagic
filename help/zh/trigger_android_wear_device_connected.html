<head>
    <title>Android Wear 设备</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>

<body>

<h1>Android Wear 设备 已连接/已断开</h1>

<div class="summary">
    <p>
        触发器 <b>Android Wear 设备</b> 在 Android Wear 设备与主设备连接或断开连接时执行。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当 Wear 手表与主设备断开连接时播放提示音。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">Android Wear 设备</div>
    <div class="setting_description">目标设备。</div>

    <div class="setting_title">设备已连接/已断开</div>
    <div class="setting_description">触发器应在设备连接时执行还是断开连接时执行。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>node_id</code></div>
    <div class="variable_description">Wear 节点的 ID</div>
</div>

</body>
