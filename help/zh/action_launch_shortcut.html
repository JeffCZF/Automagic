<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>启动快捷方式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>启动快捷方式</h1>

<div class="summary">
    <p>
        <b>启动快捷方式</b>动作启动先前定义的快捷方式。<br/>
        <br/>
        新快捷方式可以通过按钮 <em>构建快捷方式</em> 来构建，或者您可以保持动作配置打开并在其他应用中创建快捷方式，让 Automagic 捕获该快捷方式。当 Automagic 正确检测到快捷方式时，它会在屏幕上显示通知 <em>Shortcut captured by Automagic</em>。请注意，并非所有应用都支持这两种创建快捷方式的方式。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>打开特定设置页面。</li>
        <li>播放音频播放列表。</li>
        <li>直接显示联系人。</li>
    </ul>
</div>

</body>

</html>
