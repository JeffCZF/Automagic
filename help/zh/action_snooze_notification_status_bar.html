<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>状态栏通知延后再显示</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>状态栏通知延后再显示</h1>

<div class="summary">
    <p>
        动作 <b>状态栏通知延后再显示</b> 要求系统在指定的时间内隐藏通知。<br/>
        该流程必须由触发器 <b>状态栏显示通知</b> 执行，或者该动作必须在条件 <b>状态栏显示通知</b> 之后执行，否则 Automagic 无法访问该通知。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>将未接来电的通知隐藏一小时。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">持续时间。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
