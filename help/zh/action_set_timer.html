<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置计时器</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置计时器</h1>

<div class="summary">
    <p>
        动作 <b>设置计时器</b> 在设备上安装的兼容计时器应用中创建一个计时器。<br/>
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">标签</div>
    <div class="setting_description">计时器的标签。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">计时器的持续时间（秒级粒度）。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">跳过界面</div>
    <div class="setting_description">设置计时器后是否显示计时器应用。</div>
</div>

</body>

</html>
