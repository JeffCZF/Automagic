<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置接近屏幕关闭状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置接近屏幕关闭状态</h1>

<div class="summary">
    <p>
        动作 <b>设置接近屏幕关闭状态</b> 打开 Android 的一项功能，当接近传感器检测到物体时关闭显示屏。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能在 Android &lt;4.4 上不受官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每当设备靠近头部时，关闭 VoIP 应用的显示屏。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">接近屏幕关闭</div>
    <div class="setting_description">是打开还是关闭该功能。</div>

    <div class="setting_title">显示通知以重置</div>
    <div class="setting_description">是否显示通知以重置。</div>
</div>

</body>

</html>
