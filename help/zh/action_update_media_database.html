<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>更新媒体数据库（实验性）</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>更新媒体数据库（实验性）</h1>

<div class="summary">
    <p>
        动作 <b>更新媒体数据库（实验性）</b> 检查指定的文件或文件夹，从媒体数据库中删除不存在的文件，并扫描所有现有文件，以便系统在需要时可以将它们添加到媒体数据库中。<br/>
        <br/>
        <span class="note">注意：</span>请注意，扫描文件是一个重量级过程，应尽量少执行。不建议扫描整个外部存储。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>复制新文件夹后扫描该文件夹，以确保图片立即显示在图库中。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">文件</div>
    <div class="setting_description">要扫描的文件或文件夹。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
