<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Dropbox 创建目录</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>Dropbox 创建目录</h1>

<div class="summary">
    <p>
        动作 <b>Dropbox 创建目录</b> 在 Dropbox 上创建一个或多个目录。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在上传文件之前创建一个目录。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">Dropbox 访问</div>
    <div class="setting_description">
        指示当前是否可以访问 Dropbox，并允许登录您的 Dropbox 帐户。<br/>
        <br/>
        通常不需要安装 Dropbox 应用，但可以帮助解决某些设备上的身份验证问题。
    </div>

    <div class="setting_title">Dropbox 上的路径</div>
    <div class="setting_description">要创建的目录的逗号分隔列表。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>


</body>

</html>
