<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>执行次数</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>执行次数</h1>

<div class="summary">
    <p>
        条件 <b>执行次数</b> 检查该条件是否已执行了一定次数。每次执行条件时，内部计数器都会递增。当条件满足时，计数器重置为零。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在 5 分钟内收到 2 条短信时播放警报。</li>
        <li>在 10 秒内摇晃设备 2 次时关闭屏幕。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">次数</div>
    <div class="setting_description">要比较的次数。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">定时</div>
    <div class="setting_description">仅考虑在给定时长内发生的执行。</div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">要考虑的执行的最大时长。</div>
</div>

</body>

</html>
