<h1>锁定设备</h1>

<div class="summary">
    <p>
        <b>锁定设备</b>动作立即锁定设备。<br/>
        <br/>
        <span class="note">注意：</span> 必须先在首选项中启用设备管理功能才能使用此动作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当短信包含 <strong>device lost!</strong> 时锁定设备。</li>
    </ul>

</div>
