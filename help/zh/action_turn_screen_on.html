<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>点亮屏幕</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>点亮屏幕</h1>

<div class="summary">
    <p>
        动作 <b>点亮屏幕</b> 将屏幕点亮几秒钟。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>收到短信时点亮屏幕。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">屏幕亮度</div>
    <div class="setting_description">
        屏幕是完全点亮还是仅调暗。<br/>
        <br/>
        <span class="note">注意：</span>某些设备会忽略此设置并始终使用明亮模式。
    </div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">
        保持屏幕点亮的时间量。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
        <br/>
        <span class="note">注意：</span>某些设备会忽略此设置并使用更长的持续时间。
    </div>

    <div class="setting_title">重置用户活动计时器</div>
    <div class="setting_description">
        是否重置用户活动计时器。重置计时器会使屏幕保持点亮的时间稍长一些。<br/>
        <br/>
        <span class="note">注意：</span>某些设备会忽略此设置。
    </div>
</div>

</body>

</html>
