<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>重新注册媒体按钮接收器</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>重新注册媒体按钮接收器</h1>

<div class="summary">
    <p>
        动作 <b>重新注册媒体按钮接收器</b> 将 Automagic 重新注册为媒体按钮事件的接收器。<br/>
        当其他应用请求接收媒体按钮事件，导致 Automagic 不再接收这些事件时，此操作与触发器 <b>媒体按钮接收器</b> 结合使用非常有用。
    </p>
</div>

</body>

</html>
