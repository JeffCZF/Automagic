<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>休眠</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>休眠</h1>

<div class="summary">
    <p>
        动作 <b>休眠</b> 将流程执行暂停一段时间。<br/>
        <br/>
        <span class="note">注意：</span>当暂停时间超过一到两分钟，且流程功能不需要设备 CPU 保持活动状态时，请取消选中选项 <em>保持设备唤醒</em>。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在执行振动动作时休眠一秒钟。</li>
        <li>减慢倒计时流程的速度。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">持续时间</div>
    <div class="setting_description">要休眠的时间量。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">保持设备唤醒</div>
    <div class="setting_description">
        确保在执行动作期间设备不会进入深度睡眠。<br/>
        取消选中此选项不会阻止设备进入深度睡眠模式。当指定时间段过去后，设备将被唤醒。
    </div>

    <div class="setting_title">从空闲/打盹模式唤醒 (Android 6+)</div>
    <div class="setting_description">定义是否允许此动作从空闲/打盹模式恢复。（参见 <a href="device_idle_mode.html">设备空闲/打盹模式</a>）</div>
</div>

</body>

</html>
