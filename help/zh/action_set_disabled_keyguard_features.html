<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置禁用的键盘锁功能</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置禁用的键盘锁功能</h1>

<div class="summary">
    <p>
        动作 <b>设置禁用的键盘锁功能</b> 请求系统禁用锁屏上的指定功能列表（通常仅影响安全锁屏，如 PIN、密码锁屏）。<br/>
        <br/>
        <span class="note">注意：</span> 其他活动的设备管理员也可能禁用某些功能。Automagic 无法移除其他设备管理员施加的限制。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>不在家时禁用锁屏上的通知。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">要禁用的功能</div>
    <div class="setting_description">应禁用的功能。</div>
</div>

</body>

</html>
