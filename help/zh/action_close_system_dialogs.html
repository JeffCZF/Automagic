<h1>关闭系统对话框</h1>

<div class="summary">
    <p>
        <b>关闭系统对话框</b>动作用于关闭系统级对话框，例如展开的通知区域、快速设置或电源菜单。<br/>
        对话框是否被归类为系统对话框由其自身控制，普通应用的对话框和窗口无法通过此动作关闭。
    </p>
</div>
