<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置 NFC 状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置 NFC 状态</h1>

<div class="summary">
    <p>
        动作 <b>设置 NFC 状态</b> 全局打开或关闭 NFC。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能需要 root 权限，不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>进入办公室时打开 NFC 以扫描 NFC 标签。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">NFC</div>
    <div class="setting_description">是打开还是关闭 NFC。</div>

</div>

</body>

</html>
