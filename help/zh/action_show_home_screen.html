<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>显示主屏幕</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>

<body>

<h1>显示主屏幕</h1>

<div class="summary">
    <p>
        动作 <b>显示主屏幕</b> 启动主屏幕。
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">页面</div>
    <div class="setting_description">
        要显示的页面编号（仅少数启动器支持）。<a href="action_script.html#inline_expressions">支持变量。</a><br/>
        <br/>
        <span class="note">开发者注意：</span>所选页面作为名为 <em>net.dinglisch.android.tasker.extras.HOME_PAGE</em> 的 int-extra 传递给启动器。
    </div>
</div>

</body>

</html>
