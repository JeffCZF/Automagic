<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量蓝牙设备列表</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量蓝牙设备列表</h1>

<div class="summary">
    <p>
        <b>初始化变量蓝牙设备列表</b>动作将所有已配对、已连接或未连接的蓝牙设备列表存储到变量中。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>显示所有未连接的蓝牙设备对话框，并尝试连接到选中的设备。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">设备条件</div>
    <div class="setting_description">列出所有已配对、已连接还是未连接的设备。</div>

    <div class="setting_title">设备名称列表的变量</div>
    <div class="setting_description">用于存储设备名称的变量名称。</div>

    <div class="setting_title">设备地址列表的变量</div>
    <div class="setting_description">用于存储设备地址的变量名称。</div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>device_names</code></div>
    <div class="variable_description">设备名称列表</div>

    <div class="variable_name"><code>device_addresses</code></div>
    <div class="variable_description">设备地址列表</div>
</div>

</body>

</html>
