<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量下一个闹钟</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量下一个闹钟</h1>

<div class="summary">
    <p>
        动作 <b>初始化变量下一个闹钟</b> 将当前已知的下一个闹钟时间填入指定的变量。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能在 Android &lt; 5.0 上不受官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>获取下一个闹钟的时间，以便在闹钟响起前一小时显示提醒。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">变量</div>
    <div class="setting_description">变量名称。</div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>next_alarm</code></div>
    <div class="variable_description">下一个闹钟的时间，如果未设置闹钟则为 null</div>
</div>

</body>

</html>
