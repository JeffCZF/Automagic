<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>振动</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>振动</h1>

<div class="summary">
    <p>
        动作 <b>振动</b> 以特定模式振动。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>WiFi 断开连接时振动。</li>
        <li>进入某个位置时振动。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">模式类型</div>
    <div class="setting_description">使用预定义模式还是输入/录制自定义模式。</div>

    <div class="setting_title">振动模式</div>
    <div class="setting_description">
        要使用的振动模式。<br/>
        自定义模式可以使用以毫秒为单位的数字列表来组成，表示振动器打开/关闭的时间，例如 <em>0,500,1000,500</em>（暂停 0 毫秒，振动 500 毫秒，暂停 1000 毫秒，振动 500 毫秒）。
    </div>
</div>

</body>

</html>
