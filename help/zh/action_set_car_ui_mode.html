<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置车载 UI 模式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置车载 UI 模式</h1>

<div class="summary">
    <p>
        动作 <b>设置车载 UI 模式</b> 将设备置于车载 UI 模式。<br/>
        <br/>
        <span class="note">注意：</span> 并非所有设备都支持。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当您实际上没有车载底座时，启动应用的车载底座 UI 模式。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">车载 UI 模式</div>
    <div class="setting_description">是打开还是关闭车载 UI 模式。</div>

    <div class="setting_title">启动底座/主屏幕</div>
    <div class="setting_description">是否在设备可用时启动底座/主屏幕。</div>
</div>

</body>

</html>
