<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置 WiFi 休眠策略</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置 WiFi 休眠策略</h1>

<div class="summary">
    <p>
        动作 <b>设置 WiFi 休眠策略</b> 更改当前活动的休眠策略。<br/>
        <br/>
        <span class="warning">警告：</span>从 Android 4.2 开始，此功能需要 root 权限，并且并非 Android 官方支持。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>始终激活 WiFi，即使在不使用手机时也能保持与媒体中心的连接。</li>
        <li>仅在主动使用手机时激活 WiFi。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">在休眠状态下保持 WiFi 开启</div>
    <div class="setting_description">
        当手机处于休眠模式时，WiFi 是否应保持活动状态。<br/>
        <br/>
        <span class="note">注意：</span>在设备不活动时禁用 WiFi 可能会在应用程序在后台传输数据时增加移动数据的使用量。
    </div>

</div>

</body>

</html>
