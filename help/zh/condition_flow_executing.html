<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>流程正在执行</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>流程正在执行</h1>

<div class="summary">
    <p>
        条件 <b>流程正在执行</b> 检查特定流程当前是否正在执行。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当流程已在执行时，不要再次执行该流程。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">流程名称</div>
    <div class="setting_description">要检查的流程的名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>flow_execution_contexts</code></div>
    <div class="variable_description">流程当前正在执行的次数</div>
</div>

</body>

</html>
