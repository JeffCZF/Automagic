<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Gmail 未读对话计数</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>Gmail 未读对话计数</h1>

<div class="summary">
    <p>
        触发器 <b>Gmail 未读对话计数</b> 在设备上 Gmail 应用的未读对话计数发生变化时执行。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当有更多未读对话时播放通知声音。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">账户</div>
    <div class="setting_description">要检查的账户。指定多个账户时，将检查未读对话的总和。</div>

    <div class="setting_title">未读计数增加</div>
    <div class="setting_description">选中后，仅当未读对话计数增加时执行触发器。</div>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>count</code></div>
    <div class="variable_description">未读对话的数量</div>

    <div class="variable_name"><code>old_count</code></div>
    <div class="variable_description">之前的未读对话数量</div>
</div>

</body>

</html>
