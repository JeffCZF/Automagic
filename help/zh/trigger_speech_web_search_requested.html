<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>请求语音网页搜索</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>请求语音网页搜索</h1>

<div class="summary">
    <p>
        触发器 <b>请求语音网页搜索</b> 在启动基于语音识别的搜索时执行，例如通过长按耳机挂钩按钮。<br/>
    </p>
</div>

<div class="variables_section">
    变量是一个值的容器，可在许多动作和条件中用于动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">有关说明，请参阅动作脚本。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>triggertime</code></div>
    <div class="variable_description">触发器执行的时间</div>

    <div class="variable_name"><code>language_model</code></div>
    <div class="variable_description"><code>free_form</code>、<code>web_search</code> 或未设置时为 null</div>

    <div class="variable_name"><code>prompt</code></div>
    <div class="variable_description">要显示的提示，或未设置时为 null</div>

    <div class="variable_name"><code>language</code></div>
    <div class="variable_description">语言代码，或未设置时为 null</div>

    <div class="variable_name"><code>web_search_only</code></div>
    <div class="variable_description">是否应仅执行网页搜索，还是也应执行其他动作</div>

    <div class="variable_name"><code>origin</code></div>
    <div class="variable_description">触发器事件的来源，或未设置时为 null</div>
</div>

</body>

</html>
