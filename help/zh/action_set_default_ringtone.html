<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置铃声</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置铃声</h1>

<div class="summary">
    <p>
        动作 <b>设置铃声</b> 设置指定类型（铃声、闹钟或通知）的默认铃声。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在家使用不同的铃声。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">类型</div>
    <div class="setting_description">要设置的铃声类型。</div>

    <div class="setting_title">选择声音</div>
    <div class="setting_description">选择上述类别的铃声。</div>
</div>

</body>

</html>
