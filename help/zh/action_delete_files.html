<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>删除文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>删除文件</h1>

<div class="summary">
    <p>
        动作 <b>删除文件</b> 在本地删除一个或多个文件或文件夹（包括其中包含的文件）。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>每月删除 <code>/mnt/sdcard/download/</code> 文件夹中的所有文件。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">源文件</div>
    <div class="setting_description">
        要删除的文件或目录的逗号分隔列表。可以使用通配符模式匹配多个文件。<a href="action_script.html#inline_expressions">支持变量。</a>
        <br/>
        示例：
        <ul>
            <li><code>/mnt/sdcard/download/*</code> 匹配 <code>download</code> 目录中的所有文件和子文件夹</li>
        </ul>
    </div>

    <div class="setting_title">显示进度通知</div>
    <div class="setting_description">是否在状态栏上显示指示操作进度的通知。</div>
</div>

</body>

</html>
