<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置相机使用状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置相机使用状态</h1>

<div class="summary">
    <p>
        动作 <b>设置相机使用状态</b> 允许或拒绝应用使用相机。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>避免应用出于隐私原因使用相机。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">相机使用</div>
    <div class="setting_description">是否允许应用使用相机。</div>
</div>

</body>

</html>
