<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量联系人列表</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量联系人列表</h1>

<div class="summary">
    <p>
        <b>初始化变量联系人列表</b>动点将联系人列表存储在指定的变量中。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在选择列表中显示星标联系人，然后拨打选中的联系人。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">类型</div>
    <div class="setting_description">显示通讯录中的所有联系人，还是仅显示选定组中的联系人。</div>

    <div class="setting_title">组名称</div>
    <div class="setting_description">要加载的组的名称。支持通配符模式（*、?）。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>contact_list</code></div>
    <div class="variable_description">联系人列表</div>
</div>

</body>

</html>
