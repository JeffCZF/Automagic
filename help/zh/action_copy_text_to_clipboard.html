<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>复制文本到剪贴板</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>复制文本到剪贴板</h1>

<div class="summary">
    <p>
        动作 <b>复制文本到剪贴板</b> 将指定的文本复制到剪贴板。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>将扫描的条形码值复制到剪贴板，以便粘贴到浏览器中。</li>
        <li>将收到的短信文本复制到剪贴板，以便粘贴到邮件中。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">文本</div>
    <div class="setting_description">要复制到剪贴板的文本。<a href="action_script.html#inline_expressions">支持变量。</a></div>

</div>

</body>

</html>
