<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量随机数</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量随机数</h1>

<div class="summary">
    <p>
        <b>初始化变量随机数</b>动作在定义的区间内生成一个随机数。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>模拟掷骰子。</li>
        <li>为收到的每条短信播放随机声音。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">变量</div>
    <div class="setting_description">用于存储随机数的变量。</div>

    <div class="setting_title">最小值</div>
    <div class="setting_description">生成的最小值。</div>

    <div class="setting_title">最大值</div>
    <div class="setting_description">生成的最大值。</div>

</div>


<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>n</code></div>
    <div class="variable_description">包含生成的随机值</div>
</div>

</body>

</html>
