<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置键盘锁状态</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置键盘锁状态</h1>

<div class="summary">
    <p>
        动作 <b>设置键盘锁状态</b> 在此操作禁用后，全局禁用或重新启用键盘锁。<br/>
        <br/>
        <span class="warning">警告：</span> 当使用此操作禁用键盘锁后，即使使用电源按钮锁定设备，设备键盘锁也不会打开（取决于设备）。<br/>
        <br/>
        <span class="warning">警告：</span> 官方 API 将在未来的 Android 版本中移除，此操作将根据 Android 版本和设备制造商停止工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当购物清单在特定位置从后台启动时，禁用键盘锁。</li>
        <li>当购物清单应用停止时，重新启用键盘锁。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">键盘锁</div>
    <div class="setting_description">当键盘锁先前被此操作禁用时，是禁用还是重新启用键盘锁。</div>

</div>

</body>

</html>
