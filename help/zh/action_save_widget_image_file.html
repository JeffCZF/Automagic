<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>将小工具保存到图像文件</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>将小工具保存到图像文件</h1>

<div class="summary">
    <p>
        动作 <b>将小工具保存到图像文件</b> 将小工具的当前图像保存到文件中。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>在图像上添加文本，并将生成的图像作为电子邮件附件发送。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">小工具</div>
    <div class="setting_description">要保存为图像的小工具名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">文件</div>
    <div class="setting_description">存储图像的文件路径。文件类型由文件扩展名决定（支持 .jpg、.webp 和 .png）。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">图像质量</div>
    <div class="setting_description">文件压缩程度（0=小文件/差图像质量，100=大文件/好图像质量）。对于 PNG 文件，图像质量被忽略。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
