<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>初始化变量系统设置</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>初始化变量系统设置</h1>

<div class="summary">
    <p>
        <b>初始化变量系统设置</b>动作从系统设置数据库中读取一个值，并将该值存储到变量中。<br/>
    </p>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">类别</div>
    <div class="setting_description">
        <ul>
            <li><b>系统</b>：用于常规设置</li>
            <li><b>安全</b>：用于通常无法修改的设置</li>
            <li><b>全局</b>：用于适用于设备所有用户的全局设置（Android 4.2+）</li>
        </ul>
    </div>

    <div class="setting_title">名称</div>
    <div class="setting_description">要读取的设置名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>

    <div class="setting_title">变量</div>
    <div class="setting_description">用于存储值的变量名称。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

<div class="variables_section">
    变量是存储值的容器，可在许多动作和条件中使用，以动态定义文本的一部分。<br/><a href="action_script.html#inline_expressions">参见动作脚本说明。</a><br/>
    <br/>

    <div class="variables_title">提供的变量</div>

    <div class="variable_name"><code>setting</code></div>
    <div class="variable_description">设置的值</div>
</div>

</body>

</html>
