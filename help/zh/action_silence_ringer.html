<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>静音铃声</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>静音铃声</h1>

<div class="summary">
    <p>
        动作 <b>静音铃声</b> 在当前有来电振铃时使铃声静音并停止振动器。<br/>
        <br/>
        <span class="warning">警告：</span>此功能需要 root 权限，并非 Android 官方支持，可能无法在所有设备上运行。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>当您在会议中时，在来电响铃 5 秒后静音铃声。</li>
    </ul>
</div>

</body>

</html>
