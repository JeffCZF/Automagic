<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>定位动作声音</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>定位动作声音</h1>

<div class="summary">
    <p>
        动作 <b>定位动作声音</b> 在当前正在执行的 <b>声音</b> 动作中定位。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>定位到歌曲的开头。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">定位类型</div>
    <div class="setting_description">是定位到特定的绝对位置，还是快进/快退指定的持续时间。</div>

    <div class="setting_title">位置</div>
    <div class="setting_description">要定位的位置或持续时间。<a href="action_script.html#inline_expressions">支持变量。</a></div>
</div>

</body>

</html>
