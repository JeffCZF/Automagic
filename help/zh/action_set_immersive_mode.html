<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>设置沉浸模式</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>设置沉浸模式</h1>

<div class="summary">
    <p>
        动作 <b>设置沉浸模式</b> 强制沉浸/全屏模式。<br/>
        <br/>
        <span class="warning">警告：</span> 此功能不受 Android 官方支持，可能无法在所有设备上正常工作。
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>即使游戏本身尚未允许选择此模式，也以沉浸模式玩游戏。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">沉浸模式</div>
    <div class="setting_description">
        要强制使用的模式：
        <ul>
            <li><b>重置为默认</b>：重置为设备默认值，以便设备可以使用默认模式</li>
            <li><b>无导航</b>：强制全屏/沉浸模式，隐藏导航按钮</li>
            <li><b>带导航</b>：强制全屏/沉浸模式，显示导航按钮</li>
        </ul>
    </div>

    <div class="setting_title">显示状态栏通知以重置</div>
    <div class="setting_description">在状态栏中显示一个锁定图标，指示强制使用了沉浸模式。选择该通知会将值重置为默认值，相当于使用 <em>重置为默认</em> 执行此操作。</div>
</div>

</body>

</html>
