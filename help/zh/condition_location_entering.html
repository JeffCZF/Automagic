<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>进入位置</title>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
</head>
<body>

<h1>进入位置</h1>

<div class="summary">
    <p>
        条件 <b>进入位置</b> 检查是否进入或离开了一个区域。此条件应仅与 <b>位置</b> 触发器结合使用。<br/>
    </p>

    <p class="sample_separator">&nbsp;</p>
    示例：
    <ul>
        <li>进入位置时启用 WiFi，离开位置时禁用 WiFi。</li>
        <li>到达办公室时在 <b>Gleeo Time Tracker</b> 中开始记录，离开办公室时停止记录。</li>
    </ul>
</div>

<div class="settings_section">
    <div class="settings_title">设置</div>

    <div class="setting_title">进入/离开</div>
    <div class="setting_description">条件是进入位置时为真还是离开位置时为真。</div>
</div>

</body>

</html>
